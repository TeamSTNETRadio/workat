<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STNET Radio - Email Dispatch System</title>
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script src="https://cdn.auth0.com/js/auth0-spa-js/2.1/auth0-spa-js.production.js"></script>
    <style>
        @font-face {
            font-family: 'Chillax-Variable';
            src: url('/fonts/Chillax-Variable.woff2') format('woff2'),
                url('/fonts/Chillax-Variable.woff') format('woff'),
                url('/fonts/Chillax-Variable.ttf') format('truetype');
        }

        :root {
            --bg: #ffffff;
            --container-bg: rgba(255, 255, 255, 0.7);
            --border-color: rgba(0, 0, 0, 0.1);
            --input-bg: rgba(255, 255, 255, 0.9);
            --text-main: #111;
            --text-muted: #666;
            --primary: #f70000;
            --primary-hover: #cc0000;
            --success: #10b981;
            --danger: #d93025;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000000;
                --container-bg: rgba(20, 20, 20, 0.7);
                --border-color: rgba(255, 255, 255, 0.15);
                --input-bg: rgba(255, 255, 255, 0.05);
                --text-main: #eee;
                --text-muted: #aaa;
                --primary: #ff3333;
                --primary-hover: #ff6666;
            }
        }

        html,
        body {
            background-color: var(--bg) !important;
            margin: 0 !important;
            padding: 0 !important;
            min-height: 100dvh !important;
            color: var(--text-main);
            font-family: 'Inter', 'IBM Plex Sans Thai', sans-serif;
            transition: background-color 0.3s, color 0.3s;
        }

        /* Decorative glow orbs */
        .hero-glow {
            position: fixed;
            top: -10%;
            left: -10%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(247, 0, 0, 0.08) 0%, rgba(0, 0, 0, 0) 70%);
            border-radius: 50%;
            z-index: -1;
            pointer-events: none;
        }

        .hero-glow-2 {
            position: fixed;
            bottom: -10%;
            right: -10%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(247, 0, 0, 0.08) 0%, rgba(0, 0, 0, 0) 70%);
            border-radius: 50%;
            z-index: -1;
            pointer-events: none;
        }

        @media (prefers-color-scheme: dark) {

            .hero-glow,
            .hero-glow-2 {
                background: radial-gradient(circle, rgba(255, 51, 51, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            }
        }

        /* Animation */
        .fade-in-up {
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Nav and Top Bar */
        .top-bar {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
        }

        .btn-logout {
            background: var(--container-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 10px 16px;
            border-radius: 100px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: inherit;
        }

        .btn-logout:hover {
            background: rgba(247, 0, 0, 0.1);
            color: var(--primary);
            border-color: rgba(247, 0, 0, 0.2);
        }

        .page-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100dvh;
            padding: 80px 20px 40px;
        }

        .container {
            background: var(--container-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 650px;
            padding: 40px;
            box-sizing: border-box;
            position: relative;
        }

        @media (prefers-color-scheme: dark) {
            .container {
                box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 700;
            font-family: 'Chillax-Variable', 'IBM Plex Sans Thai', sans-serif;
            background: var(--text-main);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.2;
            padding-bottom: 5px;
        }

        @media (prefers-color-scheme: dark) {
            .header h1 {
                background: linear-gradient(135deg, #fff, #bbb);
                -webkit-background-clip: text;
                background-clip: text;
                -webkit-text-fill-color: transparent;
            }
        }

        .header p {
            color: var(--text-muted);
            font-size: 15px;
            margin-top: 5px;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-main);
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background-color: var(--input-bg);
            color: var(--text-main);
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s ease;
            box-sizing: border-box;
            appearance: none;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
            line-height: 1.5;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(247, 0, 0, 0.1);
            background-color: var(--bg);
        }

        @media (prefers-color-scheme: dark) {

            .form-group input:focus,
            .form-group textarea:focus {
                box-shadow: 0 0 0 3px rgba(255, 51, 51, 0.15);
            }
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .template-section {
            background-color: rgba(247, 0, 0, 0.03);
            padding: 24px 20px;
            border-radius: 16px;
            border: 1px dashed rgba(247, 0, 0, 0.2);
            margin-bottom: 30px;
        }

        @media (prefers-color-scheme: dark) {
            .template-section {
                background-color: rgba(255, 51, 51, 0.05);
                border-color: rgba(255, 51, 51, 0.2);
            }
        }

        /* Custom Select */
        .custom-select {
            position: relative;
            margin-bottom: 24px;
        }

        .select-selected {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: var(--input-bg);
            padding: 14px 16px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-main);
            font-size: 1rem;
            cursor: pointer;
            user-select: none;
            transition: all 0.3s ease;
        }

        .select-selected.placeholder-active {
            color: var(--text-muted);
        }

        .select-selected.active {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(247, 0, 0, 0.1);
            background-color: var(--bg);
        }

        @media (prefers-color-scheme: dark) {
            .select-selected.active {
                box-shadow: 0 0 0 3px rgba(255, 51, 51, 0.15);
            }
        }

        .select-selected .chevron {
            color: var(--text-muted);
            transition: transform 0.3s ease;
            font-size: 0.9rem;
        }

        .select-selected.active .chevron {
            transform: rotate(180deg);
        }

        .select-items {
            position: absolute;
            background-color: var(--container-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            top: calc(100% + 8px);
            left: 0;
            right: 0;
            z-index: 99;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            max-height: 250px;
            overflow-y: auto;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            opacity: 1;
            transform: translateY(0);
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        @media (prefers-color-scheme: dark) {
            .select-items {
                box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
            }
        }

        .select-hide {
            opacity: 0;
            transform: translateY(-10px);
            pointer-events: none;
        }

        .select-items div {
            padding: 14px 16px;
            cursor: pointer;
            color: var(--text-main);
            transition: background 0.2s ease;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.98rem;
        }

        .select-items div:last-child {
            border-bottom: none;
        }

        .select-items div:hover {
            background-color: rgba(247, 0, 0, 0.05);
            color: var(--primary);
        }

        @media (prefers-color-scheme: dark) {
            .select-items div:hover {
                background-color: rgba(255, 51, 51, 0.1);
            }
        }

        /* General Email Container */
        #generalEmailFields {
            display: none;
            background-color: var(--input-bg);
            padding: 24px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
        }

        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            font-family: 'Chillax-Variable', 'IBM Plex Sans Thai', sans-serif;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(247, 0, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 10px;
        }

        @media (prefers-color-scheme: dark) {
            .btn {
                box-shadow: 0 10px 20px rgba(255, 51, 51, 0.2);
            }
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(247, 0, 0, 0.3);
        }

        .btn:disabled {
            background: var(--border-color);
            color: var(--text-muted);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .status-message {
            margin-top: 20px;
            padding: 16px;
            border-radius: 12px;
            font-size: 0.95rem;
            text-align: center;
            display: none;
            font-weight: 500;
            border: 1px solid transparent;
        }

        #login-view,
        #app-view,
        #loading-view {
            display: none;
        }

        .active-view {
            display: block !important;
        }

        .user-info {
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
            color: var(--text-muted);
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            padding: 12px;
            border-radius: 12px;
        }
    </style>
</head>

<body>
    <div class="top-bar" id="logout-container" style="display: none;">
        <button type="button" class="btn-logout" id="btn-logout">
            <i class="fa-solid fa-arrow-right-from-bracket"></i> Logout
        </button>
    </div>

    <div class="hero-glow" aria-hidden="true"></div>
    <div class="hero-glow-2" aria-hidden="true"></div>

    <div class="page-wrapper">
        <div class="container fade-in-up">
            <div class="header">
                <h1>STNET Radio</h1>
                <p>Email Dispatch System</p>
            </div>

            <div id="loading-view" class="active-view" style="text-align: center; color: var(--text-muted);">
                <i class="fa-solid fa-spinner fa-spin"></i> Authenticating...
            </div>

            <div id="login-view">
                <p style="text-align: center; color: var(--text-muted); margin-bottom: 24px;">Please log in with your
                    STNET Radio team account.</p>
                <button id="btn-login" class="btn"><i class="fa-solid fa-right-to-bracket"></i> Login</button>
            </div>

            <div id="app-view">
                <div class="user-info">
                    Current User: <strong id="user-profile-name" style="color: var(--text-main);"></strong><br>
                    <span id="user-profile-email"></span>
                </div>

                <form id="emailForm">
                    <div class="template-section">
                        <label>Select Template</label>
                        <div class="custom-select" id="customTemplateSelect">
                            <div class="select-selected placeholder-active">
                                <span id="selectedTemplateText">-- Please select a template --</span>
                                <i class="fa-solid fa-chevron-down chevron"></i>
                            </div>
                            <div class="select-items select-hide" id="templateOptionsList">
                                <div data-value="https://stnetradio.com/email/shortlisted.html"
                                    data-subject="Initial Screening Passed - STNET Radio" data-type="standard">
                                    Shortlisted</div>
                                <div data-value="https://stnetradio.com/email/rejected.html"
                                    data-subject="Application Update - STNET Radio" data-type="standard">Rejected</div>
                                <div data-value="https://stnetradio.com/email/welcome.html"
                                    data-subject="Welcome to STNET Radio!" data-type="standard">Welcome</div>
                                <div data-value="https://stnetradio.com/email/general.html"
                                    data-subject="Notification from STNET Radio" data-type="general">General Email
                                    (อีเมลทั่วไป)</div>
                            </div>
                        </div>
                        <input type="hidden" id="templateSelect" required>

                        <div class="form-group" style="margin-bottom: 0;">
                            <label>Email Subject <span
                                    style="font-weight: normal; color: var(--text-muted); font-size: 12px;">(หัวข้ออีเมล)</span></label>
                            <input type="text" id="emailSubject" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Recipient Name <span
                                style="font-weight: normal; color: var(--text-muted); font-size: 12px;">(ชื่อผู้รับ)</span></label>
                        <input type="text" id="applicantName" required>
                    </div>
                    <div class="form-group">
                        <label>Recipient Email <span
                                style="font-weight: normal; color: var(--text-muted); font-size: 12px;">(อีเมลผู้รับ)</span></label>
                        <input type="email" id="targetEmail" required>
                    </div>

                    <div id="generalEmailFields">
                        <div class="section-title">English Content</div>
                        <div class="form-group">
                            <label>Paragraph 1 (EN)</label>
                            <textarea id="p1_en" placeholder="Hi there..."></textarea>
                        </div>
                        <div class="form-group">
                            <label>Highlight Text Box (EN)</label>
                            <textarea id="hl_en"
                                placeholder="Important Notice details... (Leave blank if not needed)"></textarea>
                        </div>
                        <div class="form-group">
                            <label>Paragraph 2 (EN)</label>
                            <textarea id="p2_en" placeholder="Further details..."></textarea>
                        </div>

                        <div class="section-title" style="margin-top: 30px;">Thai Content</div>
                        <div class="form-group">
                            <label>Paragraph 1 (TH)</label>
                            <textarea id="p1_th" placeholder="สวัสดี..."></textarea>
                        </div>
                        <div class="form-group">
                            <label>Highlight Text Box (TH)</label>
                            <textarea id="hl_th"
                                placeholder="รายละเอียดประกาศสำคัญ... (เว้นว่างไว้หากไม่ต้องการให้แสดง)"></textarea>
                        </div>
                        <div class="form-group">
                            <label>Paragraph 2 (TH)</label>
                            <textarea id="p2_th" placeholder="รายละเอียดเพิ่มเติม..."></textarea>
                        </div>

                        <div class="section-title" style="margin-top: 30px;">Sender Signature <span
                                style="font-weight: normal; font-size: 12px; text-transform: none; color: var(--text-muted);">(ลายเซ็นผู้ส่ง)</span>
                        </div>
                        <div class="grid-2">
                            <div class="form-group">
                                <label>Department (EN)</label>
                                <input type="text" id="department_en" placeholder="e.g. HR Department">
                            </div>
                            <div class="form-group">
                                <label>Department (TH)</label>
                                <input type="text" id="department_th" placeholder="e.g. แผนกทรัพยากรบุคคล">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Sender Name (TH)</label>
                            <input type="text" id="senderName_th" placeholder="e.g. ทีมงาน STNET Radio">
                        </div>
                    </div>

                    <div class="grid-2">
                        <div class="form-group">
                            <label>Sender Display Name (EN)</label>
                            <input type="text" id="senderName" value="STNET Radio HR" required>
                        </div>
                        <div class="form-group">
                            <label>Sender Email</label>
                            <input type="email" id="senderEmail" value="hr@stnetradio.com" required>
                        </div>
                    </div>

                    <div class="form-group" id="linkFieldContainer">
                        <label>Action Link <span
                                style="font-weight: normal; color: var(--text-muted); font-size: 12px;">(Booking URL /
                                Staff Portal URL)</span></label>
                        <input type="url" id="actionLink">
                    </div>

                    <button type="submit" class="btn" id="submitBtn"><i class="fa-regular fa-paper-plane"></i> Send
                        Email</button>
                    <div id="statusMessage" class="status-message"></div>
                </form>
            </div>
        </div>
    </div>

    <script>
        // --- ใส่ URL ของ Apps Script ล่าสุดตรงนี้ ---
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbyHJObG6JjRlRgA9ILS2yvQX8vLeTWgdpm1UGR57vhMQhjCfeDndeywFoZKe8Ls5DQ_/exec";

        const AUTH0_DOMAIN = "auth.stnetradio.com";
        const AUTH0_CLIENT_ID = "U4t6BLF2INrgwJbNTRXMpYitLD1SjTCW";
        let auth0Client = null;

        // Script ควบคุมการแสดงผลฟอร์ม
        const customTemplateSelect = document.getElementById('customTemplateSelect');
        const selectedTemplateText = document.getElementById('selectedTemplateText');
        const templateOptionsList = document.getElementById('templateOptionsList');
        const templateInput = document.getElementById('templateSelect');
        const selectSelected = customTemplateSelect.querySelector('.select-selected');

        // Dropdown toggle logic
        customTemplateSelect.addEventListener('click', function () {
            selectSelected.classList.toggle('active');
            templateOptionsList.classList.toggle('select-hide');
        });

        // Handle selection
        const templateOptions = templateOptionsList.querySelectorAll('div');
        templateOptions.forEach(option => {
            option.addEventListener('click', function (e) {
                e.stopPropagation();

                // Update text and value
                selectedTemplateText.textContent = this.textContent;
                templateInput.value = this.getAttribute('data-value');
                selectSelected.classList.remove('placeholder-active');

                // Close dropdown
                selectSelected.classList.remove('active');
                templateOptionsList.classList.add('select-hide');

                // Trigger update logic
                document.getElementById('emailSubject').value = this.getAttribute('data-subject');
                const templateType = this.getAttribute('data-type');

                if (templateType === 'general') {
                    document.getElementById('generalEmailFields').style.display = 'block';
                    document.getElementById('linkFieldContainer').style.display = 'none';
                } else {
                    document.getElementById('generalEmailFields').style.display = 'none';
                    document.getElementById('linkFieldContainer').style.display = 'block';
                }
            });
        });

        // Close dropdown when outside click
        document.addEventListener('click', function (e) {
            if (!customTemplateSelect.contains(e.target)) {
                selectSelected.classList.remove('active');
                templateOptionsList.classList.add('select-hide');
            }
        });

        window.onload = async () => {
            auth0Client = await auth0.createAuth0Client({
                domain: AUTH0_DOMAIN,
                clientId: AUTH0_CLIENT_ID,
                authorizationParams: { redirect_uri: window.location.href }
            });

            if (location.search.includes("state=") && (location.search.includes("code=") || location.search.includes("error="))) {
                await auth0Client.handleRedirectCallback();
                window.history.replaceState({}, document.title, window.location.pathname);
            }
            updateUI();
        };

        async function updateUI() {
            const isAuthenticated = await auth0Client.isAuthenticated();
            document.getElementById("loading-view").classList.remove("active-view");

            if (isAuthenticated) {
                document.getElementById("logout-container").style.display = "block";
                document.getElementById("login-view").classList.remove("active-view");
                document.getElementById("app-view").classList.add("active-view");
                const user = await auth0Client.getUser();
                document.getElementById("user-profile-name").innerText = user.name;
                document.getElementById("user-profile-email").innerText = user.email;
            } else {
                document.getElementById("logout-container").style.display = "none";
                document.getElementById("app-view").classList.remove("active-view");
                document.getElementById("login-view").classList.add("active-view");
            }
        }

        document.getElementById("btn-login").addEventListener("click", () => auth0Client.loginWithRedirect());
        document.getElementById("btn-logout").addEventListener("click", () => auth0Client.logout({ logoutParams: { returnTo: window.location.origin } }));

        document.getElementById('emailForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const statusDiv = document.getElementById('statusMessage');

            btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Sending...';
            statusDiv.style.display = 'block'; statusDiv.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Processing...';
            statusDiv.style.background = 'transparent';
            statusDiv.style.borderColor = 'var(--primary)';
            statusDiv.style.color = 'var(--text-main)';

            const payload = {
                templateUrl: document.getElementById('templateSelect').value,
                emailSubject: document.getElementById('emailSubject').value,
                applicantName: document.getElementById('applicantName').value,
                email: document.getElementById('targetEmail').value,
                fromName: document.getElementById('senderName').value,
                fromEmail: document.getElementById('senderEmail').value,
                actionLink: document.getElementById('actionLink').value,

                // ข้อมูลสำหรับ General Template
                p1_en: document.getElementById('p1_en').value,
                hl_en: document.getElementById('hl_en').value,
                p2_en: document.getElementById('p2_en').value,
                p1_th: document.getElementById('p1_th').value,
                hl_th: document.getElementById('hl_th').value,
                p2_th: document.getElementById('p2_th').value,

                // ข้อมูลลายเซ็น (Signature)
                department_en: document.getElementById('department_en').value,
                senderName_th: document.getElementById('senderName_th').value,
                department_th: document.getElementById('department_th').value
            };

            try {
                const response = await fetch(GAS_API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();

                if (result.status === "success") {
                    statusDiv.innerHTML = '<i class="fa-solid fa-circle-check"></i> Email sent successfully!';
                    statusDiv.style.background = 'rgba(16, 185, 129, 0.1)';
                    statusDiv.style.borderColor = 'transparent';
                    statusDiv.style.color = 'var(--success)';

                    // Clear fields
                    document.getElementById('applicantName').value = '';
                    document.getElementById('targetEmail').value = '';
                    document.getElementById('actionLink').value = '';
                } else {
                    statusDiv.innerHTML = '<i class="fa-solid fa-circle-xmark"></i> Error: ' + (result.message || 'An error occurred while sending');
                    statusDiv.style.background = 'rgba(217, 48, 37, 0.1)';
                    statusDiv.style.borderColor = 'transparent';
                    statusDiv.style.color = 'var(--danger)';
                }
            } catch (error) {
                statusDiv.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i> Unable to contact the API server';
                statusDiv.style.background = 'rgba(217, 48, 37, 0.1)';
                statusDiv.style.borderColor = 'transparent';
                statusDiv.style.color = 'var(--danger)';
            } finally {
                btn.disabled = false; btn.innerHTML = '<i class="fa-regular fa-paper-plane"></i> Send Email';
            }
        });
    </script>
</body>

</html>
